services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ML Service (Flask) ────────────────────────────────────────────────────
  ml:
    build:
      context: ./ml
      network: host
    restart: always
    environment:
      MODEL_PATH:  /app/model.pkl
      SCALER_PATH: /app/scaler.pkl
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backend (Node.js / Express) ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    restart: always
    environment:
      NODE_ENV:             production
      PORT:                 3000
      MONGODB_URI:          ${MONGODB_URI}
      SESSION_SECRET:       ${SESSION_SECRET}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL:  ${GOOGLE_CALLBACK_URL}
      ML_API_URL:           http://ml:5000
    expose:
      - "3000"
    depends_on:
      mongo:
        condition: service_healthy
      ml:
        condition: service_healthy

  # ── Frontend (React → nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      network: host
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
